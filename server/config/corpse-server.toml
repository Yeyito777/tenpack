# Tenpack death-loot policy for Corpse.
# Corpse stores player items in a corpse entity instead of dropping them as loose item entities.
# TenpackDeath controls loot protection/public access; Corpse handles storage/visuals.
# 20 ticks = 1 second.

#The time (in real life days) deaths get stored
#-1 for infinite storage
#0 for not storing deaths at all
# Default: -1
# Range: > -1
death_storage_duration = -1

[corpse]
	#The time passed (in ticks) after a corpse turns into a skeleton
	# Tenpack: 1 minute visual skeleton marker. Loot protection is enforced by TenpackDeath.
	# Default: 72000
	# Range: > 0
	skeleton_time = 1200
	#If the corpse should lie on its face
	lie_on_face = false
	#If the corpse should wear the players equipment
	show_equipment = true
	#If the corpse should fall into the void
	fall_into_void = false
	#If the corpse should get removed when in lava
	lava_damage = false

	[corpse.access]
		#If only the owner of the corpse can access the inventory
		# Defense in depth: Corpse also protects owner loot until skeleton stage.
		# TenpackDeath adds configurable protection and blocks OP bypass during testing.
		only_owner = true
		#If everybody can access the corpse in the skeleton stage (Only if only_owner_access is set to true)
		skeleton = true

	[corpse.despawn]
		#The time passed (in ticks) after a corpse despawns (only if empty)
		# Default: 600
		# Range: > 20
		time = 600
		#The time passed (in ticks) after a corpse despawns even if its not empty (-1 = never)
		# Tenpack: leave full corpses persistent until we add proper staged decomposition.
		# Default: -1
		# Range: > -1
		force_time = -1
